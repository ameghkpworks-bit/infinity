  <div class="scene">
    <!-- Message revealed behind the door -->
    <div class="message-box">
      <h1 class="sparkle-text">For my beautiful</h1>
      <h1 class="name-text">Smrithiiii...</h1>

    </div>

    <!-- The 3D Interactive Door -->
    <div class="door-frame">
      <label for="doorToggle" class="door" id="magicDoor">
        <div class="door-knob"></div>
        <div class="door-panel"></div>
        <div class="door-panel"></div>
        <div class="door-panel"></div>
        <div class="door-panel"></div>
      </label>
    </div>

    <!-- The Doodle Boy -->
    <label for="doorToggle" class="boy-doodle" title="Click me or the door!">
      <svg viewBox="0 0 100 200" width="120" height="240" stroke="#ff4d94" stroke-width="6" fill="none" class="boy-svg">
        <!-- Heart over his head, initially hidden -->
        <path class="boy-heart" d="M 50 15 A 8 8 0 0 0 35 30 L 50 45 L 65 30 A 8 8 0 0 0 50 15 Z" fill="#ff4d94" opacity="0" stroke="none" />
        <circle cx="50" cy="50" r="15" /> <!-- Head -->
        <path d="M 45 45 L 45 48 M 55 45 L 55 48" stroke-linecap="round"/> <!-- Eyes -->
        <path d="M 45 55 Q 50 60 55 55" stroke-linecap="round"/> <!-- Smile -->
        <line x1="50" y1="65" x2="50" y2="130" /> <!-- Body -->
        
        <!-- Arm pointing at door (right arm) -->
        <path class="arm-right" d="M 50 75 L 85 65" stroke-linecap="round"/>
        <!-- Arm static or cheering (left arm) -->
        <path class="arm-left" d="M 50 75 L 20 95" stroke-linecap="round"/>

        <!-- Legs -->
        <path class="leg-left" d="M 50 130 L 25 200" stroke-linecap="round"/>
        <path class="leg-right" d="M 50 130 L 75 200" stroke-linecap="round"/>
      </svg>
    </label>

    <div class="instruction" id="clickInstruction">
      <span>&#10024; Click the Door to Open My Heart &#10024;</span>
    </div>
  </div>

</body>

</html>
